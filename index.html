<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Still Life</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Special+Elite&family=Lora:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #1a1a1a; overflow: hidden; touch-action: manipulation; }
    canvas { touch-action: none; }

    #loading-screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #1a1a1a; z-index: 999;
      transition: opacity 0.4s ease;
    }
    #loading-screen.hidden { opacity: 0; pointer-events: none; }
    .splash-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 48px; color: #d8d8e8;
      animation: title-pulse 2.5s ease-in-out infinite;
    }
    .splash-sub {
      font-family: 'Special Elite', 'Courier New', monospace;
      font-size: 14px; color: #555566;
      margin-top: 18px;
      transition: color 0.3s;
    }
    .splash-sub.error { color: #aa6666; }
    .splash-cursor {
      display: inline-block;
      width: 8px; height: 16px;
      background: #555566;
      margin-left: 4px;
      vertical-align: text-bottom;
      animation: blink-cursor 0.9s step-end infinite;
    }
    @keyframes title-pulse {
      0%, 100% { opacity: 0.55; }
      50% { opacity: 1; }
    }
    @keyframes blink-cursor {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* ── Rotate overlay (landscape on mobile) ── */
    #rotate-overlay {
      position: fixed; inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      z-index: 1100;
      font-family: 'Special Elite', 'Courier New', monospace;
    }
    .rotate-phone {
      width: 62px; height: 36px;
      border: 3px solid #555577;
      border-radius: 8px;
      margin-bottom: 28px;
      position: relative;
      animation: rotate-to-portrait 2.5s ease-in-out infinite;
    }
    .rotate-phone::after {
      content: '';
      position: absolute;
      right: 5px; top: 50%;
      transform: translateY(-50%);
      width: 3px; height: 8px;
      border-radius: 2px;
      background: #555577;
    }
    @keyframes rotate-to-portrait {
      0%, 25%  { transform: rotate(0deg); }
      45%, 75% { transform: rotate(90deg); }
      100%     { transform: rotate(0deg); }
    }
    .rotate-text {
      font-size: 18px;
      color: #c0c0e0;
      margin-bottom: 8px;
    }
    .rotate-subtext {
      font-size: 13px;
      color: #666688;
    }

    @media screen and (orientation: landscape) and (max-height: 500px) {
      #rotate-overlay { display: flex; }
    }
  </style>
</head>
<body>
  <div id="loading-screen">
    <div class="splash-title">Still Life</div>
    <div class="splash-sub" id="splash-status">Loading<span class="splash-cursor"></span></div>
  </div>

  <div id="rotate-overlay">
    <div class="rotate-phone"></div>
    <div class="rotate-text">Please rotate your device</div>
    <div class="rotate-subtext">Still Life is best played in portrait</div>
  </div>

  <!-- Replace GA_MEASUREMENT_ID with your actual Google Analytics 4 Measurement ID from analytics.google.com -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=GA_MEASUREMENT_ID"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag("js", new Date());
    gtag("config", "GA_MEASUREMENT_ID");
  </script>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <script src="js/Config.js"></script>
  <script src="js/Analytics.js"></script>
  <script src="js/SoundManager.js"></script>
  <script src="js/LevelData.js"></script>
  <script src="js/CardManager.js"></script>
  <script src="js/PrologueScene.js"></script>
  <script src="js/MenuScene.js"></script>
  <script src="js/GameScene.js"></script>
  <script src="js/UIScene.js"></script>
  <script src="js/SummaryScene.js"></script>
  <script src="js/EndingScene.js"></script>
  <script src="js/CompletionScene.js"></script>
  <script src="js/LetterScene.js"></script>
  <script>
    window._loadTimer = setTimeout(function () {
      var el = document.getElementById("splash-status");
      if (el) { el.textContent = "Unable to load. Please refresh the page."; el.classList.add("error"); }
    }, 10000);

    var params = new URLSearchParams(window.location.search);
    var startAtCompletion = params.get("scene") === "completion";

    var sceneList = startAtCompletion
      ? [CompletionScene, MenuScene, PrologueScene, GameScene, UIScene, SummaryScene, EndingScene, LetterScene]
      : [MenuScene, PrologueScene, GameScene, UIScene, SummaryScene, EndingScene, CompletionScene, LetterScene];

    const config = {
      type: Phaser.AUTO,
      width: 400,
      height: 700,
      // Render at native device pixel ratio so text is sharp on Retina/OLED screens.
      // Capped at 3 to avoid excessive GPU work on very high-DPI devices.
      resolution: Math.min(window.devicePixelRatio || 1, 3),
      backgroundColor: "#1a1a1a",
      parent: document.body,
      input: { touch: true },
      scale: {
        mode: Phaser.Scale.FIT,
        autoCenter: Phaser.Scale.CENTER_BOTH,
      },
      scene: sceneList,
    };

    var game = new Phaser.Game(config);

    if (startAtCompletion) {
      clearTimeout(window._loadTimer);
      var ls = document.getElementById("loading-screen");
      if (ls) { ls.style.display = "none"; }
      history.replaceState(null, "", window.location.pathname);
    }
  </script>
</body>
</html>

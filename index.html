<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Still Life</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Special+Elite&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #0a0a0a;
      overflow: hidden;
      touch-action: manipulation;
    }
    canvas { touch-action: none; display: block; }

    #game-container {
      width: 100%; height: 100%;
      position: fixed; inset: 0;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    #loading-screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #1a1a1a; z-index: 999;
      transition: opacity 0.4s ease;
    }
    #loading-screen.hidden { opacity: 0; pointer-events: none; }
    .splash-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 48px; color: #d8d8e8;
      animation: title-pulse 2.5s ease-in-out infinite;
    }
    .splash-sub {
      font-family: 'Special Elite', 'Courier New', monospace;
      font-size: 14px; color: #555566;
      margin-top: 18px;
      transition: color 0.3s;
    }
    .splash-sub.error { color: #aa6666; }
    .splash-cursor {
      display: inline-block;
      width: 8px; height: 16px;
      background: #555566;
      margin-left: 4px;
      vertical-align: text-bottom;
      animation: blink-cursor 0.9s step-end infinite;
    }
    @keyframes title-pulse {
      0%, 100% { opacity: 0.55; }
      50% { opacity: 1; }
    }
    @keyframes blink-cursor {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* ── Rotate overlay (portrait on mobile) ── */
    #rotate-overlay {
      position: fixed; inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      z-index: 1100;
      font-family: 'Special Elite', 'Courier New', monospace;
    }
    .rotate-phone {
      width: 36px; height: 62px;
      border: 3px solid #555577;
      border-radius: 8px;
      margin-bottom: 28px;
      position: relative;
      animation: rotate-to-landscape 2.5s ease-in-out infinite;
    }
    .rotate-phone::after {
      content: '';
      position: absolute;
      bottom: 5px; left: 50%;
      transform: translateX(-50%);
      width: 8px; height: 3px;
      border-radius: 2px;
      background: #555577;
    }
    @keyframes rotate-to-landscape {
      0%, 25%  { transform: rotate(0deg); }
      45%, 75% { transform: rotate(-90deg); }
      100%     { transform: rotate(0deg); }
    }
    .rotate-text {
      font-size: 18px;
      color: #c0c0e0;
      margin-bottom: 8px;
    }
    .rotate-subtext {
      font-size: 13px;
      color: #666688;
    }

    @media screen and (orientation: portrait) and (max-width: 768px) {
      #rotate-overlay { display: flex; }
      #game-container { display: none; }
    }
    @media screen and (orientation: landscape), screen and (min-width: 769px) {
      #rotate-overlay { display: none !important; }
      #game-container { display: block; }
    }
  </style>
</head>
<body>
  <div id="loading-screen">
    <div class="splash-title">Still Life</div>
    <div class="splash-sub" id="splash-status">Loading<span class="splash-cursor"></span></div>
  </div>

  <div id="rotate-overlay">
    <div class="rotate-phone"></div>
    <div class="rotate-text">Please rotate your device</div>
    <div class="rotate-subtext">Still Life is best played in landscape</div>
  </div>

  <div id="game-container"></div>

  <!-- Replace GA_MEASUREMENT_ID with your actual Google Analytics 4 Measurement ID from analytics.google.com -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=GA_MEASUREMENT_ID"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag("js", new Date());
    gtag("config", "GA_MEASUREMENT_ID");
  </script>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <script src="js/Config.js"></script>
  <script src="js/Analytics.js"></script>
  <script src="js/SoundManager.js"></script>
  <script src="js/LevelData.js"></script>
  <script src="js/CardManager.js"></script>
  <script src="js/PrologueScene.js"></script>
  <script src="js/MenuScene.js"></script>
  <script src="js/GameScene.js"></script>
  <script src="js/UIScene.js"></script>
  <script src="js/SummaryScene.js"></script>
  <script src="js/EndingScene.js"></script>
  <script src="js/CompletionScene.js"></script>
  <script>
    window._loadTimer = setTimeout(function () {
      var el = document.getElementById("splash-status");
      if (el) { el.textContent = "Unable to load. Please refresh the page."; el.classList.add("error"); }
    }, 10000);

    var params = new URLSearchParams(window.location.search);
    var startAtCompletion = params.get("scene") === "completion";

    var sceneList = startAtCompletion
      ? [CompletionScene, MenuScene, PrologueScene, GameScene, UIScene, SummaryScene, EndingScene]
      : [MenuScene, PrologueScene, GameScene, UIScene, SummaryScene, EndingScene, CompletionScene];

    var config = {
      type: Phaser.AUTO,
      backgroundColor: "#1a1a1a",
      parent: "game-container",
      input: { touch: true },
      scale: {
        mode: Phaser.Scale.RESIZE,
        autoCenter: Phaser.Scale.NO_CENTER,
      },
      scene: sceneList,
    };

    var game = new Phaser.Game(config);

    if (startAtCompletion) {
      clearTimeout(window._loadTimer);
      var ls = document.getElementById("loading-screen");
      if (ls) { ls.style.display = "none"; }
      history.replaceState(null, "", window.location.pathname);
    }

    // Pause Phaser when portrait overlay shows, resume on landscape
    var _portraitQuery = window.matchMedia("(orientation: portrait) and (max-width: 768px)");
    function _handleOrientation(e) {
      if (!game) return;
      if (e.matches) {
        game.scene.getScenes(true).forEach(function(s) { s.scene.pause(); });
      } else {
        game.scene.getScenes(false).forEach(function(s) {
          if (s.scene.isPaused()) s.scene.resume();
        });
        setTimeout(function() {
          if (game && game.scale) game.scale.refresh();
        }, 150);
      }
    }
    _portraitQuery.addEventListener("change", _handleOrientation);
  </script>
</body>
</html>
